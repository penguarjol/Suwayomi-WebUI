<html lang="en">
<head>
    <title>Nexus Reads — Modern Manga, Manhwa & Webtoon Reader</title>

    <meta name="keywords" content="manga reader, manhwa, webtoon, read manga online, manga community, manga app" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f0f14" />

    <!-- Open Graph (link previews on Discord, Reddit, Facebook, etc.) -->

    <meta property="og:site_name" content="Nexus Reads" />
    <meta property="og:title" content="Nexus Reads — Modern Manga, Manhwa & Webtoon Reader" />

    <meta charset="utf-8"/>

    <meta name='viewport' content='minimum-scale=1, initial-scale=1, viewport-fit=cover, width=device-width'>

      manifest.json provides metadata used when your web app is installed on a

</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
<script type="module" src="./src/index.tsx"></script>
<script>
    const backgroundColor = (() => {
        const storageValue = window.localStorage.getItem("theme_background")
        try {
            return JSON.parse(storageValue)
        } catch (e) {
            return storageValue
        }
    })();

    if (backgroundColor) {
        document.documentElement.style.backgroundColor = backgroundColor;
    }
</script>
